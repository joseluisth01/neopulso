<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Página no encontrada (404) — NeoPulso</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/png" href="assets/img/logo-neopulso.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css" />
  <style>
    .error-page { min-height: 100svh; display:flex; align-items:center; justify-content:center; text-align:center; padding: 2rem; }
    .error-code { font-family: var(--font-d); font-size: clamp(6rem,20vw,12rem); font-weight:800; line-height:1; background: linear-gradient(135deg, var(--cyan), rgba(0,212,255,.3)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .error-title { font-size: clamp(1.5rem, 4vw, 2.5rem); margin-bottom: 1rem; }
    .error-desc  { color: var(--muted); font-size: 1.1rem; max-width: 480px; margin: 0 auto 2rem; }
    .error-actions { display:flex; gap:1rem; justify-content:center; flex-wrap:wrap; }
  </style>
</head>
<body>
<div id="site-header-slot"></div>

<div class="error-page">
  <div>
    <div class="error-code" aria-label="Error 404">404</div>
    <h1 class="error-title">Esta página no existe</h1>
    <p class="error-desc">Parece que la URL que buscas se ha movido o ya no existe. Sin problema — desde aquí puedes volver al inicio o contactar con nosotros.</p>
    <div class="error-actions">
      <a href="/" class="btn btn-primary btn-lg">← Volver al inicio</a>
      <a href="/#contacto" class="btn btn-ghost btn-lg">Contactar</a>
    </div>
  </div>
</div>


<div id="site-footer-slot"></div>

<script src="assets/js/partials.js"></script>
<script src="assets/js/script.js" defer></script>

</body>
</html>
